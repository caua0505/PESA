<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PESA | Homologação de Fornecedores</title>

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

  <!-- HEADER -->
  <header class="bg-yellow-500 text-white p-6 shadow-lg">
    <div class="max-w-6xl mx-auto flex justify-between items-center">
      <h1 class="text-xl font-bold">PESA - Homologação</h1>
      <span class="text-sm">Piloto ESG + IA</span>
    </div>
  </header>

  <!-- MAIN -->
  <main class="max-w-6xl mx-auto mt-8 grid grid-cols-3 gap-6">

    <!-- FORM -->
    <section class="col-span-2 bg-white p-6 rounded-2xl shadow">
      <h2 class="text-lg font-semibold mb-4 text-blue-900">Cadastro de Fornecedor</h2>

      <div class="grid grid-cols-2 gap-4">
        <input id="nome" placeholder="Nome da empresa" class="p-2 border rounded-lg" />
        <input id="cnpj" placeholder="CNPJ" class="p-2 border rounded-lg" />

        <div>
          <label class="text-xs">Compliance</label>
          <input id="compliance" type="range" min="0" max="100" value="50" class="w-full" />
        </div>

        <div>
          <label class="text-xs">ESG</label>
          <input id="esg" type="range" min="0" max="100" value="50" class="w-full" />
        </div>

        <div>
          <label class="text-xs">Reputação</label>
          <input id="reputacao" type="range" min="0" max="100" value="50" class="w-full" />
        </div>

        <div>
          <label class="text-xs">Performance</label>
          <input id="performance" type="range" min="0" max="100" value="50" class="w-full" />
        </div>
      </div>

      <button id="btnAvaliar"
        class="mt-6 w-full bg-transparent text-white py-3 rounded-xl hover:bg-blue-800 transition">
        Avaliar Fornecedor
      </button>
    </section>

    <!-- RESULTADO -->
    <section class="bg-white p-6 rounded-2xl shadow">
      <h2 class="text-lg font-semibold mb-4 text-blue-900">Resultado</h2>

      <div id="resultado" class="text-sm text-gray-700">
        <p>Preencha os dados e clique em avaliar.</p>
      </div>
    </section>

  </main>

  <!-- JS EXTERNO -->
  <script src="/static/js/app.js"></script>

</body>
</html>
